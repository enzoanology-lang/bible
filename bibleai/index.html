<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Bibleai - Chat with Scripture Intelligence</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        /* Additional mobile fixes */
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                transition: transform 0.3s ease;
                position: fixed;
                z-index: 1000;
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .main-content {
                margin-left: 0;
                width: 100%;
            }
            .menu-toggle {
                display: block;
                position: fixed;
                top: 15px;
                left: 15px;
                z-index: 1001;
                background: #d4a574;
                border: none;
                border-radius: 8px;
                padding: 10px;
                color: white;
                cursor: pointer;
            }
            .chat-header {
                padding-left: 60px;
            }
        }
        @media (min-width: 769px) {
            .menu-toggle {
                display: none;
            }
        }
        .menu-toggle {
            display: none;
        }
    </style>
</head>
<body>
    <!-- Mobile Menu Toggle Button -->
    <button class="menu-toggle" id="menu-toggle">☰</button>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h1 class="logo">Bibleai</h1>
            <p class="tagline">Scripture Intelligence</p>
        </div>
        
        <nav class="sidebar-nav">
            <a href="profile.html" class="nav-item" id="profile-link">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
                <span>View Profile</span>
            </a>
            <a href="index.html" class="nav-item active">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                </svg>
                <span>Chat</span>
            </a>
            <a href="#" class="nav-item" id="bible-link">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                    <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
                </svg>
                <span>Bible</span>
            </a>
            <a href="#" class="nav-item" id="about-link">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"></circle>
                    <path d="M12 16v-4"></path>
                    <path d="M12 8h.01"></path>
                </svg>
                <span>About Us</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <button class="logout-btn" id="logout-btn">Sign Out</button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Chat Header -->
        <header class="chat-header">
            <div class="header-left">
                <button class="new-chat-btn" id="new-chat-btn">➕ New Chat</button>
                <div class="session-info" id="session-info">Loading...</div>
            </div>
        </header>

        <!-- Chat Messages Container -->
        <div class="chat-container" id="chat-container">
            <div class="welcome-message">
                <div class="welcome-icon">✨</div>
                <h2>Welcome to Bibleai</h2>
                <p>Ask any question about scripture, theology, or biblical wisdom. I'm here to help guide your spiritual journey.</p>
            </div>
        </div>

        <!-- Chat Input -->
        <div class="chat-input-container">
            <div class="input-wrapper">
                <textarea 
                    id="message-input" 
                    placeholder="Ask about scripture, theology, or biblical wisdom..."
                    rows="1"
                ></textarea>
                <button class="mic-btn" id="mic-btn" title="Voice input">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                        <line x1="12" y1="19" x2="12" y2="23"></line>
                        <line x1="8" y1="23" x2="16" y2="23"></line>
                    </svg>
                </button>
                <button class="send-btn" id="send-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
        </div>
    </main>

    <!-- Login Modal -->
    <div class="modal-overlay" id="login-modal">
        <div class="modal">
            <div class="modal-header">
                <h2>Login to Continue</h2>
                <p>Please sign in to access Bibleai's full features</p>
            </div>
            <div class="modal-body">
                <button class="modal-btn" id="modal-login-btn">Go to Login</button>
                <button class="modal-btn secondary" id="modal-signup-btn">Create Account</button>
                <button class="modal-btn tertiary" id="modal-guest-btn">Continue as Guest</button>
            </div>
        </div>
    </div>

    <script>
        // Mobile menu toggle
        const menuToggle = document.getElementById('menu-toggle');
        const sidebar = document.getElementById('sidebar');
        
        if (menuToggle) {
            menuToggle.addEventListener('click', function() {
                sidebar.classList.toggle('open');
            });
        }
        
        // Close sidebar when clicking on a link (mobile)
        const navLinks = document.querySelectorAll('.nav-item');
        navLinks.forEach(link => {
            link.addEventListener('click', function() {
                if (window.innerWidth <= 768) {
                    sidebar.classList.remove('open');
                }
            });
        });
        
        // Check if styles.css is loaded, if not, show fallback
        function checkStyles() {
            const stylesheets = document.styleSheets;
            if (stylesheets.length === 0 || stylesheets[0].href === null) {
                console.log('Styles might not be loaded properly on Android');
            }
        }
        
        setTimeout(checkStyles, 1000);
    </script>
    <script src="app.js"></script>
</body>
</html>
