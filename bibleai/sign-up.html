<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Bibleai</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Cloudflare Turnstile Script -->
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <h1 class="logo">Bibleai</h1>
                <h2>Create Your Account</h2>
                <p>Begin your journey with Scripture Intelligence</p>
            </div>

            <form class="auth-form" id="signup-form">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input 
                        type="text" 
                        id="name" 
                        name="name" 
                        placeholder="John Doe"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="your@email.com"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="password-wrapper">
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            placeholder="Create a strong password"
                            required
                            minlength="8"
                        >
                        <button type="button" class="toggle-password" id="toggle-password">
                            <svg class="eye-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                    </div>
                    <small class="form-hint">Must be at least 8 characters</small>
                </div>

                <!-- Cloudflare Turnstile Widget -->
                <div class="form-group">
                    <div class="cf-turnstile" data-sitekey="0x4AAAAAACzSMcZjZWB8YGVr" data-callback="onTurnstileSuccess"></div>
                </div>

                <button type="submit" class="auth-btn primary" id="sign-up-btn" disabled>
                    <span>CREATE AN ACCOUNT</span>
                    <div class="loader" style="display: none;"></div>
                </button>

                <div class="divider">
                    <span>OR</span>
                </div>

                <button type="button" class="auth-btn google" id="google-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    <span>Sign up with Google</span>
                </button>
            </form>

            <div class="auth-switch">
                <p>Already have an account? <a href="sign-in.html">Sign In</a></p>
            </div>

            <div class="auth-legal">
                <p>By continuing, you agree to our <a href="#">Terms & Conditions</a> and <a href="#">Privacy Policy</a></p>
            </div>
        </div>

        <div class="auth-decoration">
            <div class="cross-pattern"></div>
        </div>
    </div>

    <script src="auth.js"></script>
    <script>
        let turnstileVerified = false;

        // Callback when Turnstile is successfully verified
        window.onTurnstileSuccess = function(token) {
            turnstileVerified = true;
            const signupBtn = document.getElementById('sign-up-btn');
            if (signupBtn) {
                signupBtn.disabled = false;
            }
            console.log('Turnstile verified successfully');
        };

        // Override handleSignup to include Turnstile verification
        const originalHandleSignup = window.handleSignup;
        if (originalHandleSignup) {
            window.handleSignup = async function(e) {
                e.preventDefault();
                
                if (!turnstileVerified) {
                    showError('Please complete the verification check');
                    return;
                }
                
                // Get the Turnstile token
                const turnstileToken = document.querySelector('[name="cf-turnstile-response"]')?.value;
                if (!turnstileToken) {
                    showError('Verification failed. Please try again.');
                    return;
                }
                
                // Call the original signup function with the token
                await originalHandleSignup(e, turnstileToken);
            };
        }
    </script>
</body>
</html>
